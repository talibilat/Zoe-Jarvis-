default_stages: [pre-commit]

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: venv/bin/python -m ruff check main.py src tests
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: ruff-format-check
        name: ruff format check
        entry: venv/bin/python -m ruff format --check main.py src tests
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: pre-push-quality-gate
        name: pre-push quality gate
        entry: bash scripts/pre_push_checks.sh
        language: system
        pass_filenames: false
        stages: [pre-push]
